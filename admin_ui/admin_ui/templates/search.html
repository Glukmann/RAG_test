{% extends "base.html" %}

{% block title %}Search — RAG Admin{% endblock %}

{% block content %}
<div class="card">
  <h2>Semantic search</h2>
  <form id="searchForm">
    <input type="text" id="query" placeholder="Enter query" required>
    <select id="docType">
      <option value="">all</option>
      <option value="docs">docs</option>
      <option value="code_examples">code_examples</option>
    </select>
    <button type="button" id="searchBtn">Search</button>
  </form>
  <div id="results"></div>
</div>

<script>
// Отключаем любую перезагрузку страницы из этого скрипта
window.onbeforeunload = function(e) {
  console.log('Block unload from search page');
  return undefined;
};

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function runSearch() {
  console.log('runSearch started');
  const q = document.getElementById('query').value;
  const docType = document.getElementById('docType').value;
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '<p>Loading...</p>';

  const url = new URL('/api/search', window.location.origin);
  url.searchParams.set('q', q);
  if (docType) url.searchParams.set('doc_type', docType);

  try {
    const resp = await fetch(url);
    const data = await resp.json();
    console.log('Response received:', data);
    resultsEl.innerHTML = '';

    if (!data.documents || !data.documents[0] || data.documents[0].length === 0) {
      resultsEl.innerHTML = '<p>No results.</p>';
      return;
    }

    data.documents[0].forEach((doc, i) => {
      const meta = data.metadatas[0][i] || {};
      const dist = data.distances[0][i] || 0;
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <p><strong>Score:</strong> ${Number(dist).toFixed(4)} | <strong>Type:</strong> ${escapeHtml(meta.doc_type || 'n/a')} | <strong>Source:</strong> <code>${escapeHtml(meta.source || 'n/a')}</code></p>
        <pre>${escapeHtml(doc)}</pre>
      `;
      resultsEl.appendChild(div);
    });
  } catch (err) {
    console.error('Search error:', err);
    resultsEl.innerHTML = '<p class="status fail">Error: ' + escapeHtml(err.message) + '</p>';
  }
}

document.getElementById('searchBtn').addEventListener('click', function(e) {
  e.preventDefault();
  e.stopPropagation();
  console.log('Search button clicked');
  runSearch();
});

document.getElementById('searchForm').addEventListener('submit', function(e) {
  e.preventDefault();
  e.stopPropagation();
  console.log('Form submit blocked');
  runSearch();
});
</script>
{% endblock %}
