{% extends "base.html" %}

{% block title %}Search — RAG Admin{% endblock %}

{% block content %}
<div class="card">
  <h2>Semantic search</h2>
  <form id="searchForm" onsubmit="return runSearch()">
    <input type="text" id="query" placeholder="Enter query" required>
    <select id="docType">
      <option value="">all</option>
      <option value="docs">docs</option>
      <option value="code_examples">code_examples</option>
    </select>
    <button type="submit">Search</button>
  </form>
  <div id="results"></div>
</div>

<script>
function getToken() {
  return localStorage.getItem('rag_admin_token') || '';
}

async function runSearch() {
  const token = getToken();
  if (!token) {
    alert('No token found. Please access with ?token=YOUR_TOKEN');
    return false;
  }

  const q = document.getElementById('query').value;
  const docType = document.getElementById('docType').value;
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '<p>Loading...</p>';

  const url = new URL('/api/search', window.location.origin);
  url.searchParams.set('q', q);
  url.searchParams.set('token', token);
  if (docType) url.searchParams.set('doc_type', docType);

  try {
    const resp = await fetch(url);
    const data = await resp.json();
    resultsEl.innerHTML = '';

    if (!data.documents || !data.documents[0]) {
      resultsEl.innerHTML = '<p>No results.</p>';
      return false;
    }

    data.documents[0].forEach((doc, i) => {
      const meta = data.metadatas[0][i];
      const dist = data.distances[0][i];
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <p><strong>Score:</strong> ${dist.toFixed(4)} | <strong>Type:</strong> ${meta.doc_type} | <strong>Source:</strong> <code>${meta.source}</code></p>
        <pre>${doc}</pre>
      `;
      resultsEl.appendChild(div);
    });
  } catch (err) {
    resultsEl.innerHTML = '<p class="status fail">Error: ' + err.message + '</p>';
  }
  return false;
}
</script>
{% endblock %}
