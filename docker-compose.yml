services:
  chromadb:
    build: ./chroma
    container_name: rag_chromadb
    env_file: .env
    environment:
      - IS_PERSISTENT=true
      - PERSIST_DIRECTORY=/chroma/chroma
      - CHROMA_SERVER_AUTHN_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - CHROMA_SERVER_AUTHN_CREDENTIALS=${CHROMA_TOKEN}
      - ANONYMIZED_TELEMETRY=false
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  indexer:
    build: ./indexer
    container_name: rag_indexer
    env_file: .env
    environment:
      - INDEXER_API_HOST=0.0.0.0
      - INDEXER_API_PORT=8001
    expose:
      - "8001"
    volumes:
      - git-sources:/data/git-sources
      - model-cache:/root/.cache/chroma/onnx_models
    networks:
      - rag-network
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped

  admin-ui:
    build: ./admin_ui
    container_name: rag_admin_ui
    env_file: .env
    environment:
      - ADMIN_UI_HOST=0.0.0.0
      - ADMIN_UI_PORT=${ADMIN_UI_PORT:-8080}
      - INDEXER_API_URL=http://indexer:8001
    volumes:
      - model-cache:/root/.cache/chroma/onnx_models
    ports:
      - "${ADMIN_UI_PORT:-8080}:8080"
    networks:
      - rag-network
    depends_on:
      chromadb:
        condition: service_healthy
      indexer:
        condition: service_started
    restart: unless-stopped

volumes:
  chroma-data:
  git-sources:
  model-cache:

networks:
  rag-network:
    driver: bridge
